name: Deploy Admin (lala-kasa-admin)

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"
  pull_request:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"

      - name: Install dependencies
        working-directory: admin
        run: npm install --frozen-lockfile

      - name: Build
        working-directory: admin
        run: npm build
        env:
          VITE_API_URL: https://lela-kasa.vercel.app
          VITE_WS_URL: https://lela-kasa.vercel.app

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name lela-kasa-admin${{ github.ref == 'refs/heads/main' && ' --branch main' || '' }}
          workingDirectory: admin
